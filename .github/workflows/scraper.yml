# Scheduled scraping + weekly DB cleanup.
#
# Secrets required (repo Settings -> Secrets and variables -> Actions):
#   NEONDB_URL   Neon connection string (same value as server/.env)
#   HF_TOKEN     HuggingFace token (model downloads; optional but avoids rate limits)
#
# Notes:
# - CLAUDE.md's "0 */30 * * *" is an INVALID cron (hour field max 23); this
#   runs daily instead. 12-hourly would also risk the 2000 free minutes/month
#   since the HF model stack is heavy.
# - HF models are ~4-6GB; the cache below keeps runs fast. Bump the key's
#   version suffix whenever MODELS in scraper/core/config.py changes, so dead
#   model weights don't ride along forever.
name: Scraper

on:
  schedule:
    - cron: '0 2 * * *'    # daily 02:00 UTC — scrape all sources
    - cron: '0 3 * * 0'    # Sunday 03:00 UTC — cleanup stale articles
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        type: choice
        options: [scrape, cleanup]
        default: scrape

concurrency:
  group: scraper
  cancel-in-progress: false

jobs:
  scrape:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 2 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.job == 'scrape')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-v2

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-v1

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Run all sources
        env:
          NEONDB_URL: ${{ secrets.NEONDB_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scraper/run_all.py

  cleanup:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * 0') ||
      (github.event_name == 'workflow_dispatch' && inputs.job == 'cleanup')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # cleanup.py only imports core.config + psycopg2 (no ML stack)
      - name: Install psycopg2
        run: pip install psycopg2-binary

      - name: Delete stale articles + vacuum
        env:
          NEONDB_URL: ${{ secrets.NEONDB_URL }}
        run: python scraper/cleanup.py --days 45 --commit --vacuum
