services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      NEON_DSN: ${NEON_DSN}
      API_KEY: ${API_KEY}
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:3000}"
    ports:
      - "8080:80"
    depends_on:
      - server
    environment:
      NODE_ENV: production
    restart: unless-stopped
