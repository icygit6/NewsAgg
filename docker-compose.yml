services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: ./server/.env          # loads NeonDB URL + all API keys at runtime
    environment:
      NODE_ENV: production
      PORT: 3000                      # operational override; .env has no PORT
      CLIENT_URL: "http://localhost:8080"   # CORS — client nginx port
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:3000}"
    ports:
      - "8080:80"
    depends_on:
      - server
    environment:
      NODE_ENV: production
    restart: unless-stopped

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    env_file: ./server/.env          # NEONDB_URL + GEMINI_API_KEY + HF_TOKEN live here
    volumes:
      - hf_cache:/root/.cache/huggingface
    profiles:
      - scraper
    restart: "no"

volumes:
  hf_cache:
