server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression untuk mengecilkan ukuran transfer file
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Routing SPA (Single Page Application) React/Vite
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files /index.html =404;
    }

    location / {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Cache JS/CSS aggressively (Vite emits content-hashed filenames); keep index.html no-store.
    location ~* \.(?:css|js)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache media/fonts briefly; these are not the data-fetching application bundle.
    location ~* \.(?:ico|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4|webp)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800";
    }
}
